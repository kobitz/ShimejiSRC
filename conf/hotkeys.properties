# Shimeji Hotkeys Configuration
# Format: <key combo>=<BehaviorName>
#
# The behavior name must exactly match one defined in behaviors.xml.
# If a mascot's image set doesn't have that behavior, it is silently skipped.
#
# Modifier keys: ctrl, shift, alt, meta
# Regular keys:  F1-F12, A-Z, 0-9, SPACE, ENTER, HOME, END, etc.
# Mouse buttons: MOUSE1 (left), MOUSE2 (right), MOUSE3 (middle), MOUSE4, MOUSE5
# Combine with + e.g. ctrl+shift+j
#
# Examples (uncomment to enable):
UP=ClimbAlongWall
F12=JumpToCursor
MOUSE4=Miko:JumpToCursor
MOUSE5=Holo:JumpToCursor
F10=2B:JumpToCursor
MOUSE5=Sephiroth:JumpToCursor
shift+MOUSE5=Hornet:JumpToCursor
ctrl+shift+q=Hornet:GrappleCursor
ctrl+shift+a=Hornet:GrappleCursorSide
alt+a=Hornet:MoveLeft
alt+d=Hornet:MoveRight
alt+SPACE=Hornet:ManualJump
alt+shift+a=Hornet:RunLeft
alt+shift+d=Hornet:RunRight
alt+ctrl+a=Hornet:DashLeft
alt+ctrl+d=Hornet:DashRight
ctrl+alt+space=Hornet:GrappleNeedle
alt+w=Hornet:ClimbAlongWall
alt+z=Hornet:HuntMosscreep
ctrl+alt+z=Hornet:HuntMosscreepNeedle
ctrl+alt+x=Appear (Self)
ctrl+alt+x=Appear (Others)
alt+1=Eevee_Egg:HatchFemaleShiny
alt+1=Zorua_Egg:HatchShiny
alt+2=InspectGrassAndEvolveIntoUmbreon!